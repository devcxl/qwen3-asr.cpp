name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0  # needed for ggml BUILD_COMMIT

    - name: Install deps (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq cmake build-essential

    - name: Install deps (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install cmake

    # ── Build ggml (submodule) ─────────────────────────────
    - name: Configure ggml
      run: |
        cmake -S ggml -B ggml/build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DGGML_CUDA=OFF \
          -DGGML_METAL=OFF \
          -DGGML_VULKAN=OFF \
          -DGGML_OPENMP=OFF \
          -DGGML_BLAS=OFF \
          -DBUILD_SHARED_LIBS=OFF \
          -DGGML_NATIVE=OFF \
          -DGGML_STANDALONE=OFF

    - name: Build ggml
      run: cmake --build ggml/build --config ${{ env.BUILD_TYPE }} -j$(nproc)

    - name: Collect ggml static libs into flat dir
      run: |
        mkdir -p ggml/build/src
        find ggml/build -name "*.a" -type f -exec cp -v {} ggml/build/src/ \;

    # ── Build project ──────────────────────────────────────
    - name: Configure project
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DGGML_DIR=${{ github.workspace }}/ggml \
          -DGGML_BUILD_DIR=${{ github.workspace }}/ggml/build \
          -DQWEN3_ASR_TIMING=OFF

    - name: Build all targets
      run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)

    - name: List build outputs
      run: ls -lh build/qwen3-asr-server build/qwen3-asr-cli 2>&1 || true

    # ── Smoke tests ────────────────────────────────────────
    - name: Smoke test — server --help
      run: ./build/qwen3-asr-server --help 2>&1 || echo "(exit $?)"

    - name: Smoke test — CLI --help
      run: ./build/qwen3-asr-cli --help 2>&1 || echo "(exit $?)"

    # ── Upload binaries ────────────────────────────────────
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qwen3-asr-${{ matrix.os }}-${{ github.sha }}
        path: |
          build/qwen3-asr-server
          build/qwen3-asr-cli
        if-no-files-found: warn

  # ── Lint (Linux only) ────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run clang-format lint
      uses: jidicula/clang-format-action@v4.14
      with:
        clang-format-version: '18'
        fallback-style: LLVM
        exclude-regex: 'third_party/'
